networks:
  local_network:
    driver: bridge
    external: true

services:
  kafka:
    image: apache/kafka:latest  # 建议指定具体版本，apache/kafka:latest 目前也是可用的
    container_name: ${APP_NAME}
    ports:
      - "${KAFKA_DOCKER_HOST_PORT}:${KAFKA_DOCKER_HOST_PORT}"
      - "${KAFKA_EXTERNAL_HOST_PORT}:${KAFKA_EXTERNAL_HOST_PORT}"
    networks:
      - local_network
    environment:
      # --- 1. 节点角色 (KRaft) ---
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@${APP_NAME}:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      
      # --- 2. 监听器配置 ---
      # 注意：内部监听和外部监听的映射
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:${KAFKA_DOCKER_HOST_PORT},CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:${KAFKA_EXTERNAL_HOST_PORT}
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://${APP_NAME}:${KAFKA_DOCKER_HOST_PORT},EXTERNAL://${KAFKA_EXTERNAL_HOST}:${KAFKA_EXTERNAL_HOST_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:SASL_PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT

      # --- 3. SASL 认证核心配置 ---
      # 告诉 Kafka 允许 PLAIN 认证机制
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      
      # 【关键点】只保留这一行指向物理路径的 OPTS
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf

      # --- 4. 其他基础配置 ---
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

    volumes:
      # 挂载数据目录 (Apache 镜像默认路径与 Bitnami 不同)
      - ${CONTAINERS_APP_DIR}/data:/var/lib/kafka/data
      # 【关键点】将宿主机创建的文件挂载进容器
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro